<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMB Web Browser - {% block title %}Page{% endblock title %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; font-size: 16px; }
        .container { width: 80%; margin: auto; overflow: hidden; padding: 20px; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-top: 20px; border-radius: 8px; }
        header { background: #333; color: #fff; padding: 20px 0; text-align: center; border-bottom: #0779e4 3px solid; margin-bottom: 20px;}
        header h1 { padding: 0; margin: 0; font-size: 24px; }
        nav { text-align: center; margin-top: 10px;}
        nav a { color: #fff; text-decoration: none; padding: 5px 15px; display: inline-block; }
        nav a:hover { background-color: #0779e4; border-radius: 4px;}
        .content { padding: 20px; }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        ul { list-style: none; padding: 0; } /* Kept for any other potential ul */
        li { padding: 10px; border-bottom: 1px solid #eee; } /* Kept for any other potential li */
        li:last-child { border-bottom: none; } /* Kept for any other potential li */
        li a { text-decoration: none; color: #0779e4; } /* Kept for any other potential li a */
        li a:hover { text-decoration: underline; } /* Kept for any other potential li a:hover */
        .icon { margin-right: 10px; } /* Old .icon, might be superseded by td img.icon */
        form { margin-top: 20px; }
        form div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], input[type="submit"] {
            width: calc(100% - 22px); /* Account for padding */
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Important for width calculation */
        }
        input[type="submit"] { background-color: #333; color: white; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease; }
        input[type="submit"]:hover { background-color: #0779e4; }
        .current-path { margin-bottom: 20px; font-size: 1.1em; color: #555; padding: 10px; background-color: #e9ecef; border-radius: 4px;}
        .current-path a { color: #007bff; }
        .item-meta { font-size: 0.9em; color: #777; margin-left: 15px; }

        /* New Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 8px 12px; border: 1px solid #ddd; text-align: left; vertical-align: middle; }
        th { background-color: #e9ecef; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        td img.icon, th img.icon { width: 16px; height: 16px; vertical-align: middle; margin-right: 5px; }
        th a { text-decoration: none; color: inherit; }
        th a:hover { text-decoration: underline; }
        .action-bar { margin-top: 20px; margin-bottom: 20px; padding: 10px; background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px;}
    </style>
</head>
<body>
    <header>
        <h1>SMB Web Browser</h1>
        <nav>
            <a href="/browse/">Home/Browse</a>
            {% if current_user_info %}
                <a href="/logout">Logout ({{ current_user_info.username }})</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </nav>
    </header>
    <div class="container">
        {% if error_message %}
            <div class="alert alert-error">{{ error_message }}</div>
        {% endif %}
        {% if info_message %}
            <div class="alert alert-info">{{ info_message }}</div>
        {% endif %}
        <div class="content">
            {% block content %}{% endblock content %}
        </div>
    </div>
</body>
</html>
